    <!-- Schema.org: FAQPage (matches Help content) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Retire Right private? Does my financial data leave my browser?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Retire Right runs entirely in your browser. Your scenario data, calculations, and optimizer results never leave your computer. Save and Load JSON write files directly to your own filesystem. The only way data leaves is if you deliberately copy the AI-prompt export into a third-party chat tool."
          }
        },
        {
          "@type": "Question",
          "name": "What is a Roth conversion and when is it worth doing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Roth conversion moves dollars from a traditional IRA to a Roth IRA. The pre-tax portion becomes ordinary income in the year of conversion. Future growth and withdrawals from the Roth are then tax-free. Conversions are typically most valuable in low-income years between retirement and RMD age 73/75, because they reduce future RMDs, lower Medicare IRMAA surcharges, and — under the SECURE Act 10-year rule — leave heirs a tax-free inheritance instead of ordinary-income-taxed withdrawals."
          }
        },
        {
          "@type": "Question",
          "name": "What is IRMAA and how does it affect Medicare premiums?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "IRMAA (Income-Related Monthly Adjustment Amount) is a surcharge on Medicare Part B and D premiums for higher-income filers. It has six tiers starting at MAGI above $106,000 single / $212,000 MFJ in 2025 and climbs steeply. Critically, IRMAA for any given year is based on your tax return from two years prior — so 2025 premiums are driven by your 2023 MAGI."
          }
        },
        {
          "@type": "Question",
          "name": "At what age do Required Minimum Distributions (RMDs) start?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Under SECURE Act 2.0, the applicable age is 73 if you were born 1951–1959, and 75 if you were born 1960 or later. RMD amounts are computed each year from the IRS Uniform Lifetime Table and are taxed as ordinary income."
          }
        },
        {
          "@type": "Question",
          "name": "How are inherited traditional IRAs taxed for heirs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non-spouse heirs of a traditional IRA or 401(k) must empty the account within 10 years (SECURE Act). Every dollar withdrawn is ordinary income to the heir at their marginal rate. Roth IRAs follow the same 10-year rule but distributions are tax-free. Taxable brokerage accounts get a step-up in basis at death, wiping out unrealized capital gains for the heir."
          }
        },
        {
          "@type": "Question",
          "name": "Does Retire Right run Monte Carlo simulations?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not yet. The current engine is deterministic — it uses your specified expected returns each year. Deterministic projections are better for explaining Roth conversion and IRMAA strategy because the logic is reproducible. Monte Carlo for sequence-of-returns risk is a planned future feature."
          }
        }
      ]
    }
