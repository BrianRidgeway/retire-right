<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171a21"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Monogram tile -->
  <rect x="110" y="150" width="200" height="200" rx="40" fill="#5eead4"/>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="118" fill="#0b0d12" letter-spacing="-4">RR</text>

  <!-- Wordmark and tagline -->
  <text x="370" y="230"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="78" fill="#e6e8ee" letter-spacing="-2">Retire Right</text>

  <text x="370" y="285"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="28" fill="#9aa3b2">Private retirement planning. Nothing leaves your browser.</text>

  <!-- Value bullets -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="22" fill="#5eead4">
    <text x="370" y="360">✓ Roth conversions</text>
    <text x="620" y="360">✓ IRMAA</text>
    <text x="760" y="360">✓ Social Security timing</text>
    <text x="1050" y="360">✓ Heir-tax modeling</text>
  </g>

  <!-- URL -->
  <text x="370" y="410"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" fill="#9aa3b2">retireright.app</text>
</svg>
